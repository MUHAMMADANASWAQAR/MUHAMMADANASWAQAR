    </text>
    <text x="72" y="240" fill="#86efac" font-size="24" font-weight="800" opacity="0">
      <tspan>Constantly improving ML skills &amp; building in public</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <g transform="translate(70 304)" font-family="Segoe UI, Arial" font-size="15" font-weight="900">
    <rect width="120" height="44" rx="22" fill="#052e16" stroke="#22c55e"/>
