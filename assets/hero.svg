    <circle cx="182" cy="178" r="126" stroke="#38bdf8" stroke-dasharray="3 18" opacity=".5">
      <animateTransform attributeName="transform" type="rotate" from="360 182 178" to="0 182 178" dur="26s" repeatCount="indefinite"/>
    </circle>
    <g stroke="url(#neon)" stroke-width="2" opacity=".72">
      <path d="M182 120L236 151V213L182 244L128 213V151L182 120Z"/>
      <path d="M182 120V82M236 151L270 132M236 213L270 232M182 244V282M128 213L94 232M128 151L94 132"/>
