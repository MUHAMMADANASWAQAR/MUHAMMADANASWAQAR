<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430">
      <stop stop-color="#020617"/>
      <stop offset=".42" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#062b2f"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22c55e"/>
      <stop offset=".52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop stop-color="#67e8f9"/>
      <stop offset=".55" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#1f2937" stroke-width="1" opacity=".55"/>
    </pattern>
  </defs>
  <rect width="1200" height="430" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="34" fill="url(#grid)" opacity=".55"/>
  <path d="M0 316 C176 252 310 376 502 306 C718 226 882 310 1200 188 V430 H0Z" fill="#22c55e" opacity=".09"/>
  <path d="M0 354 C230 275 382 405 612 336 C836 268 972 326 1200 246 V430 H0Z" fill="#38bdf8" opacity=".08"/>

  <g transform="translate(780 48)" filter="url(#glow)">
    <path d="M182 0L336 89V267L182 356L28 267V89L182 0Z" fill="#050b14" stroke="url(#neon)" stroke-width="2"/>
    <path d="M182 48L294 113V243L182 308L70 243V113L182 48Z" fill="#0b1220" stroke="#38bdf8" opacity=".75"/>
