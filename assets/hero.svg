  </g>

  <g filter="url(#glow)" font-family="Segoe UI, Arial">
    <text x="70" y="104" fill="#86efac" font-size="21" font-weight="800" letter-spacing="2">AGENTIC AI ENGINEER</text>
    <text x="70" y="177" fill="#f8fafc" font-size="60" font-weight="900">Muhammad Anas Waqar</text>
    <text x="72" y="240" fill="#cbd5e1" font-size="24" font-weight="700">
      <tspan>Hi, I am BSc Computer Engineering (3.85/4.0)</tspan>
